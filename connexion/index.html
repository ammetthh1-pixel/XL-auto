<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XLauto — Location & Vente de Véhicules</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background-color: #F9F9F9;;">

  <!-- ══ HERO SECTION (fond image) ══ -->
  <section class="hero-section">

    <!-- ══ HEADER ══ -->
    <header class="header" style="background-color: #fff;">
      <a href="#" class="logo">
        <span class="logo-dot"></span> XLauto
      </a>
      <div class="nav-panel">
        <nav class="nav">
          <a href="../index.html" class="active">Accueil</a>
          <a href="#">Nos véhicules</a>
          <a href="#vehicules">Acheter</a>
          <a href="#vehicules">Louer</a>
          <a href="#">Contact</a>
        </nav>
        <div class="header-actions">
          <button class="icon-btn" aria-label="Profil utilisateur">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </button>
          <button class="icon-btn parametre" aria-label="Paramètres">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
            </svg>
          </button>
          <a href="#" class="btn-contact">
            Réserver
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
        </div>
        <!-- Checkbox hack menu mobile — sans JS -->
        <input type="checkbox" id="menu-toggle" class="menu-toggle-input">
        <label for="menu-toggle" class="menu-toggle" aria-label="Ouvrir le menu">
          <span></span><span></span><span></span>
        </label>
      </div>
    </header>

    
</body>
</html>
